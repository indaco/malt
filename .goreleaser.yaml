version: 2

project_name: malt

before:
  hooks:
    - zig build test

builds:
  - builder: zig
    binary: malt
    targets:
      - aarch64-macos
      - x86_64-macos
    flags:
      - -Doptimize=ReleaseSafe

universal_binaries:
  - replace: true
    name_template: malt

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
    wrap_in_directory: true

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  disable: true

homebrew_casks:
  - name: malt
    repository:
      owner: indaco
      name: homebrew-tap
    directory: Casks
    homepage: https://github.com/indaco/malt
    description: A fast, Homebrew-compatible package manager for macOS
    binaries:
      - malt
      - mt
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/malt"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mt"]
          end

release:
  draft: true
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"
