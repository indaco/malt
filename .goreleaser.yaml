version: 2

project_name: malt

before:
  hooks:
    - zig build test

builds:
  - builder: zig
    binary: malt
    targets:
      - aarch64-macos
      - x86_64-macos
    flags:
      - -Doptimize=ReleaseSafe

universal_binaries:
  - replace: true
    name_template: malt
    # Drop the `mt` alias next to the universal binary so it ends up
    # inside the release tarball. Matches what `zig build` produces,
    # what install.sh creates via symlink, and what the homebrew_casks
    # stanza below already declares — the release tarball was the
    # only distribution path that shipped `malt` without `mt`.
    hooks:
      post:
        - cmd: cp "{{ .Path }}" "{{ dir .Path }}/mt"

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      # Pick up the `mt` copy produced by the universal-binaries
      # post-hook above. `dst: "."` lands it next to `malt` at the
      # archive root instead of inside an `mt/` subdir.
      - src: "dist/*_darwin_all*/mt"
        dst: "."
    wrap_in_directory: true

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  disable: true

homebrew_casks:
  - name: malt
    repository:
      owner: indaco
      name: homebrew-tap
    directory: Casks
    homepage: https://github.com/indaco/malt
    description: A fast, Homebrew-compatible package manager for macOS
    binaries:
      - malt
      - mt
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/malt"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mt"]
          end

release:
  draft: true
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"
