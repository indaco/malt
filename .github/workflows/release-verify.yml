name: Release Verify

# Post-publish smoke against the live release artifacts. Triggers when
# the release is flipped from draft to published (by the
# `create-release-notes` job in release.yml). Proves end-to-end that:
# the one-liner from the README reaches the artifacts, cosign verifies
# the signature against the expected workflow identity, the tarball
# SHA256 matches checksums.txt, and the installed binary can fetch +
# install a trivial formula. A failure here means the release is
# broken for users — investigate before shipping.

on:
  release:
    types: [published]

permissions: {}

jobs:
  smoke:
    name: Install smoke (live release)
    runs-on: macos-14
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Run release-install smoke
        run: ./scripts/e2e/smoke_install_release.sh
