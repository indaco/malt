name: CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.zig"
      - "**/*.zon"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.zig"
      - "**/*.zon"
      - ".github/workflows/ci.yml"

jobs:
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build (Debug)
        run: zig build

      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: Run unit tests
        run: zig build test

      - name: Smoke test — version flag
        run: ./zig-out/bin/malt --version

      - name: Smoke test — help flag
        run: ./zig-out/bin/malt --help

      - name: Build universal binary
        run: zig build universal -Doptimize=ReleaseSafe

  lint:
    name: Lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check formatting
        run: zig fmt --check src/ tests/
