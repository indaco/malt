name: CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.zig"
      - "**/*.zon"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.zig"
      - "**/*.zon"
      - ".github/workflows/ci.yml"

jobs:
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build (Debug)
        run: zig build

      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: Run unit tests
        # `zig build test` deadlocks under Zig 0.16 (test-runner IPC
        # pipe hangs once children finish), so install the test
        # binaries and execute each one directly. Identical coverage.
        run: |
          set -euo pipefail
          zig build test-bin
          fail=0
          for t in zig-out/test-bin/*_test; do
              name=$(basename "$t")
              if ! "$t"; then
                  echo "FAIL: $name"
                  fail=$((fail + 1))
              fi
          done
          if [ "$fail" -ne 0 ]; then
              echo "$fail test binary(ies) failed."
              exit 1
          fi

      - name: Smoke test — version flag
        run: ./zig-out/bin/malt --version

      - name: Smoke test — help flag
        run: ./zig-out/bin/malt --help

      - name: Build universal binary
        run: zig build universal -Doptimize=ReleaseSafe

  lint:
    name: Lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check formatting
        run: zig fmt --check src/ tests/
