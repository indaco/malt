name: CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.zig"
      - "**/*.zon"
      - "scripts/**/*.sh"
      - "src/core/pins_manifest.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.zig"
      - "**/*.zon"
      - "scripts/**/*.sh"
      - "src/core/pins_manifest.txt"
      - ".github/workflows/ci.yml"

jobs:
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build (Debug)
        run: zig build

      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: Run unit tests
        run: zig build test --summary all

      - name: Smoke test — version flag
        run: ./zig-out/bin/malt --version

      - name: Smoke test — help flag
        run: ./zig-out/bin/malt --help

      # Offline CLI smoke: exercises every documented command + alias
      # against an isolated MALT_PREFIX. Tier 3 (network installs) is
      # skipped in CI — it lives in the benchmark workflow already.
      - name: CLI smoke (offline tiers)
        env:
          SMOKE_SKIP_NETWORK: "1"
        run: ./scripts/e2e/smoke_test.sh

      # Security smoke: flag-scope enforcement, argv-only lint,
      # pins-manifest shape, install.sh fail-closed regression suite.
      # Subsumes the individual install.sh step that used to live in
      # the Lint job.
      - name: Security smoke
        run: ./scripts/e2e/smoke_security.sh

      - name: Build universal binary
        run: zig build universal -Doptimize=ReleaseSafe

  lint:
    name: Lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check Zig formatting
        run: zig fmt --check src/ tests/

      - name: Install shell-lint tools
        run: brew install shellcheck shfmt

      - name: Lint shell scripts (shellcheck + shfmt)
        run: |
          shellcheck scripts/*.sh scripts/test/*.sh scripts/e2e/*.sh
          shfmt -i 2 -d scripts/*.sh scripts/test/*.sh scripts/e2e/*.sh

  # Drift guard: if a PR changes the pinned commit or the manifest,
  # re-run gen-pins.sh against the committed pin and fail on any diff.
  # Catches "bumped pins.zig, forgot to regenerate the manifest" (or
  # vice-versa) before the binary embeds a stale allowlist.
  pins-drift:
    name: Pins drift
    runs-on: macos-14
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Detect pin changes
        id: changed
        run: |
          git fetch --depth=1 origin "${{ github.base_ref }}"
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD \
            | grep -E '^src/core/pins(\.zig|_manifest\.txt)$' >/dev/null; then
            echo "run=true" >>"$GITHUB_OUTPUT"
          else
            echo "run=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Regenerate against committed pin
        if: steps.changed.outputs.run == 'true'
        run: |
          PINNED=$(grep -E 'HOMEBREW_CORE_COMMIT_SHA.*=.*"' src/core/pins.zig \
            | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "committed pin: $PINNED"
          ./scripts/gen-pins.sh "$PINNED"

      - name: Fail on drift
        if: steps.changed.outputs.run == 'true'
        run: |
          if ! git diff --quiet -- src/core/pins.zig src/core/pins_manifest.txt; then
            echo "::error::pins manifest is out of sync with the committed pin."
            echo "Run scripts/gen-pins.sh \$PINNED_COMMIT and commit the diff."
            git --no-pager diff -- src/core/pins.zig src/core/pins_manifest.txt
            exit 1
          fi
