name: Release

on:
  # Pushing a semver tag is the single source of truth for "cut a
  # release". Goreleaser creates the GitHub release itself, then the
  # notes job edits it with the changelog. Keeps the happy path to:
  #   sley bump auto && sley changelog merge && sley tag create --push
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  goreleaser:
    name: goreleaser
    runs-on: macos-14
    # id-token: write is the minimum for cosign keyless - it lets the
    # job mint a GitHub OIDC token that Sigstore exchanges for a
    # short-lived signing certificate. Nothing else is widened.
    permissions:
      contents: write
      id-token: write
    environment:
      name: Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          # Release runs rarely; a fresh compile takes a few extra
          # minutes but is worth it. A cancelled or crashed release
          # job (e.g. the one we killed while debugging the smoke
          # race) leaves a half-written .zig-cache entry, which the
          # next release picks up and tries to exec — producing an
          # InvalidExe failure on a "cached 102ms" binary. Releases
          # are a trust boundary; always rebuild from scratch.
          use-cache: false

      - name: Run unit tests
        run: zig build test --summary all

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}

  create-release-notes:
    name: release-notes
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: write
    environment:
      name: Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update release with notes
        env:
          # `ref_name` is the tag (e.g. v0.7.0) on push:tags events.
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          # Fail loud and early if the changelog fragment is missing —
          # `gh release edit --notes-file` otherwise errors cryptically
          # after already touching the release.
          notes_file="${{ github.workspace }}/.changes/${TAG_NAME}.md"
          if [ ! -f "$notes_file" ]; then
            echo "::error::missing changelog fragment at $notes_file" \
                 "— run 'sley changelog merge' before 'sley tag create --push'"
            exit 1
          fi
          gh release edit "$TAG_NAME" \
            --title "$TAG_NAME" \
            --draft=false \
            --prerelease=false \
            --latest \
            --notes-file "$notes_file"

  # End-to-end smoke: installs from the published release artifacts and
  # verifies cosign + checksum + a trivial formula install. Runs here
  # (not in a separate `release: published` workflow) so the job order
  # is strictly sequential — goreleaser uploads, notes publish, smoke
  # runs. A non-draft release would otherwise race two workflows on
  # the same event and 404 on the asset before goreleaser uploads it.
  install-smoke:
    name: Install smoke (live release)
    runs-on: macos-14
    needs: create-release-notes
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Run release-install smoke
        env:
          # Authenticated API calls raise the ceiling from 60/hr per
          # runner IP (shared across the macos-14 pool) to 5000/hr,
          # which both the propagation wait and install.sh probe rely
          # on. Contents-read is the only scope consulted.
          MALT_SMOKE_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/e2e/smoke_install_release.sh
