name: Release

on:
  release:
    types: [created]

permissions: {}

jobs:
  goreleaser:
    name: goreleaser
    runs-on: macos-14
    # id-token: write is the minimum for cosign keyless - it lets the
    # job mint a GitHub OIDC token that Sigstore exchanges for a
    # short-lived signing certificate. Nothing else is widened.
    permissions:
      contents: write
      id-token: write
    environment:
      name: Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run unit tests
        run: zig build test --summary all

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}

  create-release-notes:
    name: release-notes
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: write
    environment:
      name: Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update release with notes
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release edit "$TAG_NAME" \
            --title "$TAG_NAME" \
            --draft=false \
            --prerelease=false \
            --latest \
            --notes-file "${{ github.workspace }}/.changes/${TAG_NAME}.md"

  # End-to-end smoke: installs from the published release artifacts and
  # verifies cosign + checksum + a trivial formula install. Runs here
  # (not in a separate `release: published` workflow) so the job order
  # is strictly sequential — goreleaser uploads, notes publish, smoke
  # runs. A non-draft release would otherwise race two workflows on
  # the same event and 404 on the asset before goreleaser uploads it.
  install-smoke:
    name: Install smoke (live release)
    runs-on: macos-14
    needs: create-release-notes
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Run release-install smoke
        run: ./scripts/e2e/smoke_install_release.sh
