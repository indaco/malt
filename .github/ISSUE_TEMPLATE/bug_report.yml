name: Bug Report
description: Report a bug or unexpected behavior in malt
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: malt version
      description: What version of malt are you running? (`mt version`)
      placeholder: "e.g., 0.7.0"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      description: Output of `sw_vers -productVersion`.
      placeholder: "e.g., 14.5"
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - Apple Silicon (arm64)
        - Intel (x86_64)
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - install.sh (one-liner)
        - Homebrew (brew install indaco/tap/malt)
        - Built from source
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `mt install jq`
        2. Run `mt upgrade`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: If applicable, paste any error messages or logs. Re-running with `--debug` surfaces every DSL diagnostic and is the most useful output for triage.
      render: shell

  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Output of `mt doctor`, if relevant.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
